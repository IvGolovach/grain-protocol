name: Build evidence bundle
description: Stage deterministic evidence artifacts and archive the final bundle.
inputs:
  workflow_name:
    description: Workflow name recorded in the evidence summary.
    required: true
  tag:
    description: Optional tag recorded in the evidence summary.
    required: false
    default: ""
  include_sdk_suite:
    description: Include the SDK suite summary in the evidence summary JSON.
    required: false
    default: "false"
  hash_order:
    description: File ordering for evidence hash computation.
    required: false
    default: full-first
runs:
  using: composite
  steps:
    - name: Prepare evidence inputs
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p artifacts/evidence
        python3 tools/ci/generate_vector_manifest.py \
          --vectors-root conformance/vectors \
          --pattern '*.json' \
          --out artifacts/evidence/vector-manifest.json
        python3 tools/ci/generate_vector_manifest.py \
          --vectors-root conformance/vectors \
          --pattern '*-WA-*.json' \
          --out artifacts/evidence/vector-manifest-c01.json

        sha256sum core/rust/Cargo.lock | awk '{print $1}' > artifacts/evidence/cargo.lock.sha256
        sha256sum core/rust/rust-toolchain.toml | awk '{print $1}' > artifacts/evidence/rust-toolchain.sha256
        sha256sum runner/typescript/package-lock.json | awk '{print $1}' > artifacts/evidence/package-lock.json.sha256
        sha256sum core/ts/grain-sdk/package-lock.json | awk '{print $1}' > artifacts/evidence/sdk-package-lock.json.sha256
        sha256sum artifacts/evidence/vector-manifest.json | awk '{print $1}' > artifacts/evidence/vector-manifest.sha256
        sha256sum artifacts/evidence/vector-manifest-c01.json | awk '{print $1}' > artifacts/evidence/vector-manifest-c01.sha256
        python3 tools/ci/build_inputs_hashes.py --out artifacts/evidence/inputs-hashes.json
        python3 tools/ci/audit_invariants.py \
          --out-json artifacts/evidence/invariants-audit.json \
          --out-md artifacts/evidence/invariants-audit.md

    - name: Build suite summary JSON
      shell: bash
      env:
        WORKFLOW_NAME: ${{ inputs.workflow_name }}
        TAG_VALUE: ${{ inputs.tag }}
        INCLUDE_SDK_SUITE: ${{ inputs.include_sdk_suite }}
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import json
        import os
        import pathlib

        root = pathlib.Path("artifacts")
        rust = json.loads((root / "rust-suite-summary.json").read_text())
        ts = json.loads((root / "ts-c01-summary.json").read_text())
        div = json.loads((root / "divergence-c01.json").read_text())
        ts_full = json.loads((root / "ts-full-summary.json").read_text())
        ts_suite = json.loads((root / "suite-run-ts.json").read_text())
        div_full = json.loads((root / "divergence-full.json").read_text())
        props_full = json.loads((root / "properties-full.json").read_text())
        include_sdk_suite = os.environ["INCLUDE_SDK_SUITE"].lower() == "true"
        workflow_name = os.environ["WORKFLOW_NAME"]
        tag = os.environ.get("TAG_VALUE", "")
        commit = os.environ["GITHUB_SHA"]

        suite_summary = {
          "commit_sha": commit,
          "strict": True,
          "rust_full": {
            "total": rust["total"],
            "passed": rust["passed"],
            "failed": rust["failed"],
          },
          "ts_c01": {
            "total": ts["total"],
            "passed": ts["passed"],
            "failed": ts["failed"],
          },
          "divergence_c01": {
            "total": div["total"],
            "mismatches": div["mismatches"],
          },
          "ts_full": {
            "total": ts_full["total"],
            "passed": ts_full["passed"],
            "failed": ts_full["failed"],
          },
          "ts_suite_runner": {
            "total": ts_suite["total"],
            "passed": ts_suite["passed"],
            "failed": ts_suite["failed"],
          },
          "divergence_full": {
            "total": div_full["total"],
            "mismatches": div_full["mismatches"],
          },
          "properties_full": {
            "failed": props_full["failed"],
          },
        }

        if include_sdk_suite:
          sdk_suite = json.loads((root / "sdk-suite-summary.json").read_text())
          suite_summary["sdk_suite"] = {
            "total": sdk_suite["total"],
            "passed": sdk_suite["passed"],
            "failed": sdk_suite["failed"],
          }

        if tag:
          suite_summary["tag"] = tag

        suite_run = {
          "commit_sha": commit,
          "metadata": {
            "workflow": workflow_name,
            "run_id": os.environ.get("GITHUB_RUN_ID", ""),
            "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          },
          "summary": suite_summary,
        }

        if tag:
          suite_run["tag"] = tag

        out = root / "evidence"
        out.mkdir(parents=True, exist_ok=True)
        (out / "suite-summary.json").write_text(json.dumps(suite_summary, indent=2) + "\n")
        (out / "suite-run.json").write_text(json.dumps(suite_run, indent=2) + "\n")
        PY

    - name: Copy run outputs into evidence
      shell: bash
      run: |
        set -euo pipefail
        cp artifacts/rust-suite-summary.json artifacts/evidence/rust-suite-summary.json
        cp artifacts/ts-c01-summary.json artifacts/evidence/ts-c01-summary.json
        cp artifacts/divergence-c01.json artifacts/evidence/divergence-c01.json
        cp artifacts/divergence-c01.md artifacts/evidence/divergence-c01.md
        cp artifacts/rust-suite-summary.json artifacts/evidence/suite-run-rust.json
        cp artifacts/suite-run-ts.json artifacts/evidence/suite-run-ts.json
        cp artifacts/ts-full-summary.json artifacts/evidence/ts-full-summary.json
        cp artifacts/sdk-suite-summary.json artifacts/evidence/sdk-suite-summary.json
        cp artifacts/divergence-full.json artifacts/evidence/divergence-full.json
        cp artifacts/divergence-full.md artifacts/evidence/divergence-full.md
        cp artifacts/properties-full.json artifacts/evidence/properties-full.json
        cp artifacts/properties-full.json artifacts/evidence/property-tests.json
        cp artifacts/wasm-subset-summary.json artifacts/evidence/wasm-subset-summary.json
        cp artifacts/wasm.sha256 artifacts/evidence/wasm.sha256

    - name: Build interop evidence summary
      shell: bash
      run: |
        set -euo pipefail
        python3 tools/ci/build_interop_summary.py \
          --commit-sha "${GITHUB_SHA}" \
          --out-dir artifacts/evidence \
          --suite-rust artifacts/evidence/suite-run-rust.json \
          --suite-ts artifacts/evidence/suite-run-ts.json \
          --div-c01 artifacts/evidence/divergence-c01.json \
          --div-full artifacts/evidence/divergence-full.json \
          --properties artifacts/evidence/property-tests.json \
          --invariants-audit artifacts/evidence/invariants-audit.json

    - name: Compute evidence hash
      shell: bash
      env:
        HASH_ORDER: ${{ inputs.hash_order }}
      run: |
        set -euo pipefail
        if [[ "${HASH_ORDER}" == "c01-first" ]]; then
          python3 tools/ci/compute_evidence_sha.py \
            --base-dir artifacts/evidence \
            --out artifacts/evidence/evidence.sha256 \
            --file divergence-c01.json \
            --file divergence-full.json \
            --file inputs-hashes.json \
            --file interop-evidence.json \
            --file interop-report.md \
            --file invariants-audit.json \
            --file property-tests.json \
            --file sdk-suite-summary.json \
            --file suite-run-rust.json \
            --file suite-run-ts.json \
            --file vector-manifest.json \
            --file wasm.sha256
        else
          python3 tools/ci/compute_evidence_sha.py \
            --base-dir artifacts/evidence \
            --out artifacts/evidence/evidence.sha256 \
            --file divergence-full.json \
            --file divergence-c01.json \
            --file inputs-hashes.json \
            --file interop-evidence.json \
            --file interop-report.md \
            --file invariants-audit.json \
            --file property-tests.json \
            --file sdk-suite-summary.json \
            --file suite-run-rust.json \
            --file suite-run-ts.json \
            --file vector-manifest.json \
            --file wasm.sha256
        fi

    - name: Archive evidence
      shell: bash
      run: |
        set -euo pipefail
        cd artifacts
        zip -r "evidence-${GITHUB_SHA}.zip" evidence
