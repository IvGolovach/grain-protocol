name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate vectors
        run: python3 tools/validate_vectors.py

      - name: Check LLM docs mappings
        run: python3 tools/check_llm_docs.py

      - name: Check spec drift
        run: python3 tools/check_spec_drift.py

      - name: Check .gitattributes policy
        run: python3 tools/ci/check_gitattributes_policy.py

      - name: Check forbidden tracked files
        run: python3 tools/ci/check_forbidden_tracked.py

      - name: Check CRLF in tracked text files
        run: python3 tools/ci/check_crlf_tracked.py

      - name: Check CODEOWNERS critical coverage
        run: python3 tools/ci/check_codeowners_coverage.py

      - name: Check Dependabot automerge policy consistency
        run: python3 tools/ci/check_dependabot_policy.py

      - name: Docs link check
        run: python3 tools/ci/check_docs_links.py

      - name: Docs flow check
        run: python3 tools/ci/check_docs_flow.py

      - name: Check runner_v1 contract compatibility
        run: python3 tools/ci/check_runner_contract_compat.py

      - name: Check prohibition-zone coverage
        run: python3 tools/ci/check_prohibition_coverage.py

      - name: Check branch protection drift (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
        run: |
          python3 tools/ci/check_branch_protection_drift.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch main \
            --expected-contexts "python-tooling,rust-core,ts-c01,ts-full,evidence-bundle" \
            --expected-approvals 0 \
            --expected-codeowner-reviews false \
            --expected-enforce-admins true \
            --expected-linear-history true \
            --expected-allow-force-pushes false \
            --expected-allow-deletions false \
            --expected-conversation-resolution true

      - name: Ensure no macOS metadata files
        run: |
          ! find . -name ".DS_Store" -print | grep -q .

      - name: Ensure no Python cache artifacts
        run: |
          ! find . -name "__pycache__" -print | grep -q .

      - name: Compile Python tooling
        run: python3 -m py_compile tools/*.py tools/ci/*.py

  capid-csprng-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: cap_id CSPRNG static audit
        run: python3 tools/ci/check_capid_csprng.py

  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust 1.86.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Rust tests
        run: cargo test --manifest-path core/rust/Cargo.toml --workspace

      - name: Build grain-runner binary
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-runner

      - name: Quickstart smoke (deterministic demo output)
        run: |
          python3 tools/ci/check_quickstart_smoke.py \
            --runner-cmd core/rust/target/debug/grain-runner demo --strict

      - name: Rust strict conformance suite
        run: |
          python3 tools/ci/run_runner_suite.py \
            --vectors-root conformance/vectors \
            --commit-sha "${GITHUB_SHA}" \
            --out artifacts/rust-suite-summary.json \
            --runner-cmd core/rust/target/debug/grain-runner run --strict --vector

      - name: Upload rust suite summary
        uses: actions/upload-artifact@v6
        with:
          name: rust-suite-summary
          path: artifacts/rust-suite-summary.json

  ts-c01:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: runner/typescript/package-lock.json

      - name: Install TS runner deps
        run: npm ci --prefix runner/typescript

      - name: Run TS C01 strict profile
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types runner/typescript/scripts/run-c01.ts

      - name: Run Rust vs TS divergence (C01)
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types runner/typescript/scripts/divergence-c01.ts

      - name: Collect TS artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.c01-last-run.json artifacts/ts-c01-summary.json
          cp runner/typescript/.divergence-c01.json artifacts/divergence-c01.json
          cp runner/typescript/.divergence-c01.md artifacts/divergence-c01.md

      - name: Upload TS C01 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ts-c01-results
          path: artifacts/*

  ts-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust 1.86.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: runner/typescript/package-lock.json

      - name: Install TS runner deps
        run: npm ci --prefix runner/typescript

      - name: Build grain-runner binary (RC stabilization smoke)
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-runner

      - name: Run RC stabilization smoke (TOR-RC-STAB-A01)
        run: |
          python3 tools/stabilization/run_rc_stab.py \
            --mode smoke \
            --out-dir artifacts/rc-stab-smoke \
            --baseline-tag repo-rc-v0.4.0-rc1 \
            --baseline-evidence-sha 35475fd1767ec873a4bfa46c51ffffd23843831e21df5c17db0e5d2162b3a1bd \
            --rust-runner-cmd core/rust/target/debug/grain-runner \
            --repo "${GITHUB_REPOSITORY}"

      - name: Run TS full strict profile
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types runner/typescript/scripts/run-full.ts

      - name: TS strict conformance suite (runner contract, full)
        run: |
          python3 tools/ci/run_runner_suite.py \
            --vectors-root conformance/vectors \
            --commit-sha "${GITHUB_SHA}" \
            --out artifacts/suite-run-ts.json \
            --runner-cmd node --experimental-strip-types runner/typescript/src/cli.ts run --strict --vector

      - name: SDK strict conformance suite (through SDK runner)
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types core/ts/grain-sdk/scripts/run-protocol-suite.ts

      - name: SDK invariant checks
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types core/ts/grain-sdk/scripts/test-sdk-invariants.ts

      - name: Run Rust vs TS divergence (full suite)
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types runner/typescript/scripts/divergence-full.ts

      - name: Run TS property tests (full engine)
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types runner/typescript/scripts/properties-full.ts

      - name: Collect TS full artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.full-last-run.json artifacts/ts-full-summary.json
          cp runner/typescript/.divergence-full.json artifacts/divergence-full.json
          cp runner/typescript/.divergence-full.md artifacts/divergence-full.md
          cp runner/typescript/.properties-full.json artifacts/properties-full.json

      - name: Upload TS full artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ts-full-results
          path: artifacts/*

  wasm-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust 1.86.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Add wasm target
        run: rustup target add wasm32-wasip1

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: runner/typescript/package-lock.json

      - name: Install TS runner deps
        run: npm ci --prefix runner/typescript

      - name: Build grain-core-wasm
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-core-wasm --target wasm32-wasip1 --release

      - name: Run WASM subset vectors
        run: NODE_NO_WARNINGS=1 node --experimental-strip-types runner/typescript/scripts/run-wasm-subset.ts

      - name: Collect WASM artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.wasm-subset-last-run.json artifacts/wasm-subset-summary.json
          sha256sum core/rust/target/wasm32-wasip1/release/grain_core_wasm.wasm | awk '{print $1}' > artifacts/wasm.sha256

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wasm-smoke-results
          path: artifacts/wasm*

  fuzz-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust 1.86.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: runner/typescript/package-lock.json

      - name: Install TS runner deps
        run: npm ci --prefix runner/typescript

      - name: Build grain-runner binary
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-runner

      - name: Run deterministic fuzz smoke corpus
        run: ./scripts/fuzz-smoke --out-dir artifacts/fuzz-smoke

      - name: Upload fuzz smoke artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fuzz-smoke-results
          path: artifacts/fuzz-smoke

  verify-script-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build grain-certify container locally
        run: docker build -f docker/grain-certify.Dockerfile -t grain-certify-ci:${GITHUB_SHA} .

      - name: Run one-command verify smoke
        run: ./scripts/verify --image grain-certify-ci:${GITHUB_SHA} --out-dir artifacts/verify-smoke

      - name: Verify evidence hash exists
        run: test -f artifacts/verify-smoke/evidence/evidence_content.sha256

  evidence-bundle:
    runs-on: ubuntu-latest
    needs: [python-tooling, capid-csprng-audit, rust-core, ts-c01, ts-full, wasm-smoke]
    steps:
      - uses: actions/checkout@v6

      - name: Download rust summary
        uses: actions/download-artifact@v7
        with:
          name: rust-suite-summary
          path: artifacts

      - name: Download TS artifacts
        uses: actions/download-artifact@v7
        with:
          name: ts-c01-results
          path: artifacts

      - name: Download TS full artifacts
        uses: actions/download-artifact@v7
        with:
          name: ts-full-results
          path: artifacts

      - name: Download WASM artifacts
        uses: actions/download-artifact@v7
        with:
          name: wasm-smoke-results
          path: artifacts

      - name: Build deterministic manifests and hashes
        run: |
          mkdir -p artifacts/evidence
          python3 tools/ci/generate_vector_manifest.py \
            --vectors-root conformance/vectors \
            --pattern '*.json' \
            --out artifacts/evidence/vector-manifest.json
          python3 tools/ci/generate_vector_manifest.py \
            --vectors-root conformance/vectors \
            --pattern '*-WA-*.json' \
            --out artifacts/evidence/vector-manifest-c01.json

          sha256sum core/rust/Cargo.lock | awk '{print $1}' > artifacts/evidence/cargo.lock.sha256
          sha256sum core/rust/rust-toolchain.toml | awk '{print $1}' > artifacts/evidence/rust-toolchain.sha256
          sha256sum runner/typescript/package-lock.json | awk '{print $1}' > artifacts/evidence/package-lock.json.sha256
          sha256sum artifacts/evidence/vector-manifest.json | awk '{print $1}' > artifacts/evidence/vector-manifest.sha256
          sha256sum artifacts/evidence/vector-manifest-c01.json | awk '{print $1}' > artifacts/evidence/vector-manifest-c01.sha256
          python3 tools/ci/build_inputs_hashes.py --out artifacts/evidence/inputs-hashes.json
          python3 tools/ci/audit_invariants.py \
            --out-json artifacts/evidence/invariants-audit.json \
            --out-md artifacts/evidence/invariants-audit.md

      - name: Build suite summary JSON
        run: |
          python3 - << 'PY'
          import json, pathlib, os
          root = pathlib.Path('artifacts')
          rust = json.loads((root/'rust-suite-summary.json').read_text())
          ts = json.loads((root/'ts-c01-summary.json').read_text())
          div = json.loads((root/'divergence-c01.json').read_text())
          ts_full = json.loads((root/'ts-full-summary.json').read_text())
          sdk_suite = json.loads((root/'sdk-suite-summary.json').read_text())
          ts_suite = json.loads((root/'suite-run-ts.json').read_text())
          div_full = json.loads((root/'divergence-full.json').read_text())
          props_full = json.loads((root/'properties-full.json').read_text())
          commit = os.environ['GITHUB_SHA']

          suite_summary = {
            'commit_sha': commit,
            'strict': True,
            'rust_full': {
              'total': rust['total'],
              'passed': rust['passed'],
              'failed': rust['failed']
            },
            'ts_c01': {
              'total': ts['total'],
              'passed': ts['passed'],
              'failed': ts['failed']
            },
            'divergence_c01': {
              'total': div['total'],
              'mismatches': div['mismatches']
            },
            'ts_full': {
              'total': ts_full['total'],
              'passed': ts_full['passed'],
              'failed': ts_full['failed']
            },
            'sdk_suite': {
              'total': sdk_suite['total'],
              'passed': sdk_suite['passed'],
              'failed': sdk_suite['failed']
            },
            'ts_suite_runner': {
              'total': ts_suite['total'],
              'passed': ts_suite['passed'],
              'failed': ts_suite['failed']
            },
            'divergence_full': {
              'total': div_full['total'],
              'mismatches': div_full['mismatches']
            },
            'properties_full': {
              'failed': props_full['failed']
            }
          }

          suite_run = {
            'commit_sha': commit,
            'metadata': {
              'workflow': os.environ.get('GITHUB_WORKFLOW', 'ci'),
              'run_id': os.environ.get('GITHUB_RUN_ID', ''),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT', ''),
            },
            'summary': suite_summary,
          }

          out = root/'evidence'
          out.mkdir(parents=True, exist_ok=True)
          (out/'suite-summary.json').write_text(json.dumps(suite_summary, indent=2) + '\n')
          (out/'suite-run.json').write_text(json.dumps(suite_run, indent=2) + '\n')
          PY

      - name: Copy run outputs into evidence
        run: |
          cp artifacts/rust-suite-summary.json artifacts/evidence/rust-suite-summary.json
          cp artifacts/ts-c01-summary.json artifacts/evidence/ts-c01-summary.json
          cp artifacts/divergence-c01.json artifacts/evidence/divergence-c01.json
          cp artifacts/divergence-c01.md artifacts/evidence/divergence-c01.md
          cp artifacts/rust-suite-summary.json artifacts/evidence/suite-run-rust.json
          cp artifacts/suite-run-ts.json artifacts/evidence/suite-run-ts.json
          cp artifacts/ts-full-summary.json artifacts/evidence/ts-full-summary.json
          cp artifacts/sdk-suite-summary.json artifacts/evidence/sdk-suite-summary.json
          cp artifacts/divergence-full.json artifacts/evidence/divergence-full.json
          cp artifacts/divergence-full.md artifacts/evidence/divergence-full.md
          cp artifacts/properties-full.json artifacts/evidence/properties-full.json
          cp artifacts/properties-full.json artifacts/evidence/property-tests.json
          cp artifacts/wasm-subset-summary.json artifacts/evidence/wasm-subset-summary.json
          cp artifacts/wasm.sha256 artifacts/evidence/wasm.sha256

      - name: Build interop evidence summary
        run: |
          python3 tools/ci/build_interop_summary.py \
            --commit-sha "${GITHUB_SHA}" \
            --out-dir artifacts/evidence \
            --suite-rust artifacts/evidence/suite-run-rust.json \
            --suite-ts artifacts/evidence/suite-run-ts.json \
            --div-c01 artifacts/evidence/divergence-c01.json \
            --div-full artifacts/evidence/divergence-full.json \
            --properties artifacts/evidence/property-tests.json \
            --invariants-audit artifacts/evidence/invariants-audit.json

      - name: Compute evidence hash
        run: |
          python3 tools/ci/compute_evidence_sha.py \
            --base-dir artifacts/evidence \
            --out artifacts/evidence/evidence.sha256 \
            --file divergence-full.json \
            --file divergence-c01.json \
            --file inputs-hashes.json \
            --file interop-evidence.json \
            --file interop-report.md \
            --file invariants-audit.json \
            --file property-tests.json \
            --file sdk-suite-summary.json \
            --file suite-run-rust.json \
            --file suite-run-ts.json \
            --file vector-manifest.json \
            --file wasm.sha256

      - name: Archive evidence
        run: |
          cd artifacts
          zip -r "evidence-${GITHUB_SHA}.zip" evidence

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v6
        with:
          name: evidence-${{ github.sha }}
          path: artifacts/evidence-${{ github.sha }}.zip
