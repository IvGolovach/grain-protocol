name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  python-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/python-policy-checks
        with:
          run_main_ruleset_drift: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          gh_token: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}

  capid-csprng-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: cap_id CSPRNG static audit
        run: python3 tools/ci/check_capid_csprng.py

  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/rust-core-verification

      - name: Upload rust suite summary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: rust-suite-summary
          path: artifacts/rust-suite-summary.json

  ts-c01:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-node-typescript

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:c01

      - name: Run Rust vs TS divergence (C01)
        run: npm --prefix runner/typescript run divergence:c01

      - name: Collect TS artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.c01-last-run.json artifacts/ts-c01-summary.json
          cp runner/typescript/.divergence-c01.json artifacts/divergence-c01.json
          cp runner/typescript/.divergence-c01.md artifacts/divergence-c01.md

      - name: Upload TS C01 artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ts-c01-results
          path: artifacts/*

  ts-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - uses: ./.github/actions/setup-rust-toolchain

      - uses: ./.github/actions/setup-node-typescript

      - name: Build grain-runner binary (RC stabilization smoke)
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-runner

      - name: Run RC stabilization smoke (TOR-RC-STAB-A01)
        run: |
          python3 tools/stabilization/run_rc_stab.py \
            --mode smoke \
            --out-dir artifacts/rc-stab-smoke \
            --baseline-tag repo-rc-v0.4.0-rc1 \
            --baseline-evidence-sha 35475fd1767ec873a4bfa46c51ffffd23843831e21df5c17db0e5d2162b3a1bd \
            --rust-runner-cmd core/rust/target/debug/grain-runner \
            --repo "${GITHUB_REPOSITORY}"

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:full

      - name: TS strict conformance suite (runner contract, full)
        run: |
          python3 tools/ci/run_runner_suite.py \
            --vectors-root conformance/vectors \
            --commit-sha "${GITHUB_SHA}" \
            --out artifacts/suite-run-ts.json \
            --runner-cmd node runner/typescript/dist/src/cli.js run --strict --vector

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: run:protocol-suite

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: test:invariants

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: test:ai-boundary

      - name: Run Rust vs TS divergence (full suite)
        run: GRAIN_RUST_RUNNER_BIN=core/rust/target/debug/grain-runner npm --prefix runner/typescript run divergence:full

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:cborseq-contract

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:properties

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:integer-precision

      - name: Collect TS full artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.full-last-run.json artifacts/ts-full-summary.json
          cp runner/typescript/.divergence-full.json artifacts/divergence-full.json
          cp runner/typescript/.divergence-full.md artifacts/divergence-full.md
          cp runner/typescript/.properties-full.json artifacts/properties-full.json

      - name: Upload TS full artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ts-full-results
          path: artifacts/*

  wasm-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-rust-toolchain

      - name: Add wasm target
        run: rustup target add wasm32-wasip1

      - uses: ./.github/actions/setup-node-typescript

      - name: Build grain-core-wasm
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-core-wasm --target wasm32-wasip1 --release

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:wasm-subset

      - name: Collect WASM artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.wasm-subset-last-run.json artifacts/wasm-subset-summary.json
          sha256sum core/rust/target/wasm32-wasip1/release/grain_core_wasm.wasm | awk '{print $1}' > artifacts/wasm.sha256

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: wasm-smoke-results
          path: artifacts/wasm*

  fuzz-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - uses: ./.github/actions/setup-rust-toolchain
      - uses: ./.github/actions/setup-node-typescript

      - name: Build grain-runner binary
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-runner

      - name: Run deterministic fuzz smoke corpus
        run: ./scripts/fuzz-smoke --out-dir artifacts/fuzz-smoke

      - name: Upload fuzz smoke artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: fuzz-smoke-results
          path: artifacts/fuzz-smoke

  verify-script-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}

      - name: Build grain-certify container locally
        run: docker build -f docker/grain-certify.Dockerfile -t grain-certify-ci:${GITHUB_SHA} .

      - name: Run one-command verify smoke
        run: ./scripts/verify --image grain-certify-ci:${GITHUB_SHA} --out-dir artifacts/verify-smoke

      - name: Verify evidence hash exists
        run: test -f artifacts/verify-smoke/evidence/evidence_content.sha256

  evidence-bundle:
    runs-on: ubuntu-latest
    needs: [python-tooling, capid-csprng-audit, rust-core, ts-c01, ts-full, wasm-smoke]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Download upstream artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh run download "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name rust-suite-summary --dir artifacts
          gh run download "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name ts-c01-results --dir artifacts
          gh run download "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name ts-full-results --dir artifacts
          gh run download "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name wasm-smoke-results --dir artifacts

      - uses: ./.github/actions/build-evidence-bundle
        with:
          workflow_name: ci
          include_sdk_suite: "true"
          hash_order: full-first

      - name: Upload evidence bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: evidence-${{ github.sha }}
          path: artifacts/evidence-${{ github.sha }}.zip
