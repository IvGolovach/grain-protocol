name: golden-images

on:
  push:
    tags:
      - "repo-*"
      - "repo-rc-*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: grain-runner
            file: docker/grain-runner.Dockerfile
          - name: grain-certify
            file: docker/grain-certify.Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure Docker buildx and QEMU
        run: |
          docker run --privileged --rm tonistiigi/binfmt@sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3 --install all
          docker buildx create --name ci-builder --driver docker-container --use || docker buildx use ci-builder
          docker buildx inspect --bootstrap

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Select publish tag lane
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "::error::GOLDEN_ERR_TAG_REQUIRED: golden images publish only from repo-* tags."
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" == repo-rc-* ]]; then
            echo "PUBLISH_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF_NAME}" == repo-* ]]; then
            echo "PUBLISH_TAG=stable" >> "$GITHUB_ENV"
          else
            echo "::error::GOLDEN_ERR_TAG_REQUIRED: golden images publish only from repo-* tags."
            exit 1
          fi

      - name: Build and push ${{ matrix.image.name }}
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image_base="ghcr.io/${owner_lc}/${repo_lc}/${{ matrix.image.name }}"
          publish_tag="${image_base}:${PUBLISH_TAG}"
          sha_tag="${image_base}:${GITHUB_SHA}"
          docker buildx build \
            --file "${{ matrix.image.file }}" \
            --platform linux/amd64,linux/arm64 \
            --tag "${publish_tag}" \
            --tag "${sha_tag}" \
            --push \
            .
          digest="$(docker buildx imagetools inspect "${sha_tag}" --format '{{json .Manifest.Digest}}' | tr -d '\"')"
          echo "IMAGE_DIGEST=${digest}" >> "$GITHUB_ENV"

      - name: Write digest manifest
        run: |
          owner_lc="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          mkdir -p artifacts
          cat > "artifacts/${{ matrix.image.name }}-digest.json" <<JSON
          {
            "image": "ghcr.io/${owner_lc}/${repo_lc}/${{ matrix.image.name }}",
            "commit_sha": "${{ github.sha }}",
            "digest": "${IMAGE_DIGEST}"
          }
          JSON

      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: golden-image-${{ matrix.image.name }}-${{ github.sha }}
          path: artifacts/${{ matrix.image.name }}-digest.json
