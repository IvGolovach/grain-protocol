name: golden-images

on:
  workflow_dispatch:
  push:
    tags:
      - "repo-*"
      - "repo-rc-*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: grain-runner
            file: docker/grain-runner.Dockerfile
          - name: grain-certify
            file: docker/grain-certify.Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.image.name }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:stable
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ github.sha }}

      - name: Write digest manifest
        run: |
          mkdir -p artifacts
          cat > "artifacts/${{ matrix.image.name }}-digest.json" <<JSON
          {
            "image": "ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}",
            "commit_sha": "${{ github.sha }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          JSON

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: golden-image-${{ matrix.image.name }}-${{ github.sha }}
          path: artifacts/${{ matrix.image.name }}-digest.json
