name: release-evidence

on:
  push:
    tags:
      - "protocol-*"
      - "repo-*"
      - "protocol-rc-*"
      - "repo-rc-*"

permissions:
  contents: write

jobs:
  build-and-publish-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: ./.github/actions/python-policy-checks

      - uses: ./.github/actions/rust-core-verification
        with:
          build_wasm: "true"

      - uses: ./.github/actions/setup-node-typescript

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:c01

      - name: Run Rust vs TS divergence (C01)
        run: GRAIN_RUST_RUNNER_BIN=core/rust/target/debug/grain-runner npm --prefix runner/typescript run divergence:c01

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:full

      - name: TS strict conformance suite (runner contract, full)
        run: |
          python3 tools/ci/run_runner_suite.py \
            --vectors-root conformance/vectors \
            --commit-sha "${GITHUB_SHA}" \
            --out artifacts/suite-run-ts.json \
            --runner-cmd node runner/typescript/dist/src/cli.js run --strict --vector

      - name: Run Rust vs TS divergence (full suite)
        run: GRAIN_RUST_RUNNER_BIN=core/rust/target/debug/grain-runner npm --prefix runner/typescript run divergence:full

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:properties

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:integer-precision

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: run:protocol-suite

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: test:invariants

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: test:ai-boundary

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:wasm-subset

      - name: Collect TS artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.c01-last-run.json artifacts/ts-c01-summary.json
          cp runner/typescript/.divergence-c01.json artifacts/divergence-c01.json
          cp runner/typescript/.divergence-c01.md artifacts/divergence-c01.md
          cp runner/typescript/.full-last-run.json artifacts/ts-full-summary.json
          cp runner/typescript/.divergence-full.json artifacts/divergence-full.json
          cp runner/typescript/.divergence-full.md artifacts/divergence-full.md
          cp runner/typescript/.properties-full.json artifacts/properties-full.json
          cp runner/typescript/.wasm-subset-last-run.json artifacts/wasm-subset-summary.json
          sha256sum core/rust/target/wasm32-wasip1/release/grain_core_wasm.wasm | awk '{print $1}' > artifacts/wasm.sha256

      - uses: ./.github/actions/build-evidence-bundle
        with:
          workflow_name: release-evidence
          tag: ${{ github.ref_name }}
          hash_order: c01-first

      - name: Upload evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: evidence-${{ github.sha }}
          path: artifacts/evidence-${{ github.sha }}.zip

      - name: Attach evidence to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          asset="artifacts/evidence-${GITHUB_SHA}.zip"
          is_rc=0
          if [[ "${tag}" == protocol-rc-* || "${tag}" == repo-rc-* ]]; then
            is_rc=1
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" --clobber
            if [[ "${is_rc}" -eq 1 ]]; then
              gh release edit "${tag}" --prerelease
            fi
          else
            if [[ "${is_rc}" -eq 1 ]]; then
              gh release create "${tag}" "${asset}" --title "${tag}" --generate-notes --prerelease
            else
              gh release create "${tag}" "${asset}" --title "${tag}" --generate-notes
            fi
          fi
