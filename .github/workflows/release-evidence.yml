name: release-evidence

on:
  push:
    tags:
      - "protocol-*"
      - "repo-*"
      - "protocol-rc-*"
      - "repo-rc-*"

permissions:
  actions: read
  contents: write

jobs:
  sdk-release-package:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - uses: ./.github/actions/setup-rust-toolchain

      - name: Install WASI target
        run: rustup target add wasm32-wasip1

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: Install TypeScript SDK dependencies
        run: |
          npm ci --prefix core/ts/grain-ts-core
          npm ci --prefix core/ts/grain-sdk
          npm ci --prefix core/ts/grain-sdk-ai

      - name: Install WASM SDK dependencies
        run: npm ci --prefix sdk/wasm

      - name: Install WASM scanner dependencies
        run: npm ci --prefix examples/wasm-scanner

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"

      - name: Show Swift version
        run: swift --version

      - name: Verify platform SDKs
        run: scripts/sdk/verify_all_sdks.sh --strict --out-dir artifacts/sdk-platform

      - name: Package SDK release artifacts
        run: |
          scripts/sdk/package_client_sdks.sh \
            --skip-verify \
            --verified-by release-evidence-sdk-platform \
            --out-dir artifacts/sdk-release

      - name: Verify external developer handoff
        run: |
          expected_commit="$(git rev-parse HEAD)"
          python3 tools/ci/check_sdk_compatibility_matrix.py \
            --manifest artifacts/sdk-release/manifest.json
          python3 tools/ci/check_external_consumer_templates.py \
            --out-dir artifacts/sdk-release \
            --expected-commit "${expected_commit}"
          python3 tools/ci/check_external_release_consumer_smoke.py \
            --out-dir artifacts/sdk-release \
            --expected-commit "${expected_commit}" \
            --strict \
            --consumer-root artifacts/external-release-consumer-smoke
          scripts/sdk/check_registry_dry_runs.sh \
            --out-dir artifacts/sdk-registry-dry-runs

      - name: Upload SDK platform results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sdk-platform-results
          path: artifacts/sdk-platform

      - name: Upload SDK registry dry-run results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sdk-registry-dry-run-results
          path: artifacts/sdk-registry-dry-runs

      - name: Upload SDK release package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sdk-release-package
          path: artifacts/sdk-release/*

  build-and-publish-evidence:
    runs-on: ubuntu-latest
    needs: sdk-release-package
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: ./.github/actions/python-policy-checks

      - uses: ./.github/actions/rust-core-verification
        with:
          build_wasm: "true"

      - uses: ./.github/actions/setup-node-typescript

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:c01

      - name: Run Rust vs TS divergence (C01)
        run: GRAIN_RUST_RUNNER_BIN=core/rust/target/debug/grain-runner npm --prefix runner/typescript run divergence:c01

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:full

      - name: TS strict conformance suite (runner contract, full)
        run: |
          python3 tools/ci/run_runner_suite.py \
            --vectors-root conformance/vectors \
            --commit-sha "${GITHUB_SHA}" \
            --out artifacts/suite-run-ts.json \
            --runner-cmd node runner/typescript/dist/src/cli.js run --strict --vector

      - name: Run Rust vs TS divergence (full suite)
        run: GRAIN_RUST_RUNNER_BIN=core/rust/target/debug/grain-runner npm --prefix runner/typescript run divergence:full

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:properties

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:integer-precision

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:base64-contract

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: test:e2e-contract

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: run:protocol-suite

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk
          script: test:invariants

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: core/ts/grain-sdk-ai
          script: test:boundary

      - uses: ./.github/actions/run-node-package-script
        with:
          prefix: runner/typescript
          script: run:wasm-subset

      - name: Collect TS artifacts
        run: |
          mkdir -p artifacts
          cp runner/typescript/.c01-last-run.json artifacts/ts-c01-summary.json
          cp runner/typescript/.divergence-c01.json artifacts/divergence-c01.json
          cp runner/typescript/.divergence-c01.md artifacts/divergence-c01.md
          cp runner/typescript/.full-last-run.json artifacts/ts-full-summary.json
          cp runner/typescript/.divergence-full.json artifacts/divergence-full.json
          cp runner/typescript/.divergence-full.md artifacts/divergence-full.md
          cp runner/typescript/.properties-full.json artifacts/properties-full.json
          cp runner/typescript/.wasm-subset-last-run.json artifacts/wasm-subset-summary.json
          sha256sum core/rust/target/wasm32-wasip1/release/grain_core_wasm.wasm | awk '{print $1}' > artifacts/wasm.sha256

      - name: Download SDK release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name sdk-platform-results \
            --dir artifacts
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name sdk-release-package \
            --dir artifacts/sdk-release

      - name: Verify SDK release package metadata
        run: |
          expected_commit="$(git rev-parse HEAD)"
          python3 tools/ci/check_sdk_release_package.py \
            --out-dir artifacts/sdk-release \
            --expected-commit "${expected_commit}" \
            --require-strict \
            --require-clean
          python3 tools/ci/check_external_sdk_handoff.py \
            --out-dir artifacts/sdk-release \
            --expected-commit "${expected_commit}" \
            --require-strict \
            --require-clean
          python3 tools/ci/check_external_consumer_templates.py \
            --out-dir artifacts/sdk-release \
            --expected-commit "${expected_commit}"
          python3 tools/ci/check_external_release_consumer_smoke.py \
            --out-dir artifacts/sdk-release \
            --expected-commit "${expected_commit}" \
            --layout-only \
            --consumer-root artifacts/external-release-consumer-smoke
          python3 tools/ci/check_sdk_compatibility_matrix.py \
            --manifest artifacts/sdk-release/manifest.json

      - uses: ./.github/actions/build-evidence-bundle
        with:
          workflow_name: release-evidence
          tag: ${{ github.ref_name }}
          hash_order: c01-first
          include_sdk_suite: "true"

      - name: Upload evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: evidence-${{ github.sha }}
          path: artifacts/evidence-${{ github.sha }}.zip

      - name: Attach evidence to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          asset="artifacts/evidence-${GITHUB_SHA}.zip"
          sdk_asset_dir="artifacts/sdk-release"
          shopt -s nullglob
          sdk_assets=("${sdk_asset_dir}"/*)
          if [[ "${#sdk_assets[@]}" -eq 0 ]]; then
            echo "RELEASE_ERR_SDK_ASSETS_MISSING: no SDK release package assets found" >&2
            exit 1
          fi
          is_rc=0
          if [[ "${tag}" == protocol-rc-* || "${tag}" == repo-rc-* ]]; then
            is_rc=1
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" "${sdk_assets[@]}" --clobber
            if [[ "${is_rc}" -eq 1 ]]; then
              gh release edit "${tag}" --prerelease
            fi
          else
            if [[ "${is_rc}" -eq 1 ]]; then
              gh release create "${tag}" "${asset}" "${sdk_assets[@]}" --title "${tag}" --generate-notes --prerelease
            else
              gh release create "${tag}" "${asset}" "${sdk_assets[@]}" --title "${tag}" --generate-notes
            fi
          fi
