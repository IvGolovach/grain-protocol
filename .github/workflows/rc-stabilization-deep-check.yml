name: rc-stabilization-deep-check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deep-stabilization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Set up Rust 1.86.0
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.86.0

      - name: Set up Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: runner/typescript/package-lock.json

      - name: Install TS runner deps
        run: npm ci --prefix runner/typescript

      - name: Build grain-runner binary
        run: cargo build --manifest-path core/rust/Cargo.toml -p grain-runner

      - name: Run deep stabilization window (TOR-RC-STAB-A01)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 tools/stabilization/run_rc_stab.py \
            --mode deep \
            --out-dir artifacts/rc-stab-deep \
            --baseline-tag repo-rc-v0.4.0-rc1 \
            --baseline-evidence-sha 35475fd1767ec873a4bfa46c51ffffd23843831e21df5c17db0e5d2162b3a1bd \
            --rust-runner-cmd core/rust/target/debug/grain-runner \
            --repo "${GITHUB_REPOSITORY}"

      - name: Upload deep stabilization artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: rc-stab-deep-${{ github.sha }}
          path: artifacts/rc-stab-deep
