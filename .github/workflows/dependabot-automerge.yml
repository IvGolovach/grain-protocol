name: dependabot-automerge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependabot-safe-lane:
    if: >
      !github.event.pull_request.draft &&
      contains(fromJson('["dependabot[bot]","app/dependabot"]'), github.event.pull_request.user.login) &&
      contains(fromJson('["dependabot[bot]","app/dependabot"]'), github.actor)
    runs-on: ubuntu-latest
    env:
      GH_BOT_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
      GH_FALLBACK_TOKEN: ${{ github.token }}
    steps:
      - name: Evaluate allowlist/denylist policy
        id: policy
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          # Keep false to ensure zero-friction on safe workflow updates.
          BLOCK_SEMVER_MAJOR_ACTIONS: "false"
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_BOT_TOKEN:-$GH_FALLBACK_TOKEN}"

          gh pr edit "$PR" --repo "$REPO" --add-label dependencies --add-label ci >/dev/null 2>&1 || true

          safe=true
          reasons=()

          mapfile -t files < <(gh api "repos/$REPO/pulls/$PR/files?per_page=100" --paginate --jq '.[].filename')
          if [[ "${#files[@]}" -eq 0 ]]; then
            safe=false
            reasons+=("no-changed-files")
          fi

          for f in "${files[@]}"; do
            case "$f" in
              .github/workflows/*|.github/dependabot.yml|.github/ISSUE_TEMPLATE/*|.github/actions/*)
                ;;
              *)
                safe=false
                reasons+=("path-not-allowlisted:$f")
                ;;
            esac

            case "$f" in
              spec/*|conformance/*|core/*|runner/*|docs/llm/*|tools/*)
                safe=false
                reasons+=("denylist-hit:$f")
                ;;
              *)
                ;;
            esac
          done

          if [[ "${BLOCK_SEMVER_MAJOR_ACTIONS}" == "true" ]]; then
            if [[ "$TITLE" =~ from[[:space:]]v?([0-9]+)([^[:space:]]*)[[:space:]]to[[:space:]]v?([0-9]+) ]]; then
              from_major="${BASH_REMATCH[1]}"
              to_major="${BASH_REMATCH[3]}"
              if [[ "$from_major" != "$to_major" ]]; then
                safe=false
                reasons+=("semver-major:$from_major->$to_major")
              fi
            fi
          fi

          printf '%s\n' "${reasons[@]}" > policy-reasons.txt
          if [[ "$safe" == "true" ]]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "safe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Manual-review lane comment
        if: steps.policy.outputs.safe != 'true'
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_BOT_TOKEN:-$GH_FALLBACK_TOKEN}"
          gh pr edit "$PR" --repo "$REPO" --add-label needs-manual >/dev/null 2>&1 || true
          body="Dependabot automerge policy: manual-review lane.\n\nReasons:\n$(sed 's/^/- /' policy-reasons.txt)"
          gh pr comment "$PR" --repo "$REPO" --body "$body" >/dev/null 2>&1 || true
          echo "Manual lane applied."

      - name: Update stale branch
        if: steps.policy.outputs.safe == 'true'
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_BOT_TOKEN:-$GH_FALLBACK_TOKEN}"
          if [[ -z "${GH_BOT_TOKEN:-}" ]]; then
            echo "::warning::DEPENDABOT_AUTOMERGE_TOKEN is not configured. Fallback to github.token may fail for workflow-file PR updates."
          fi

          run_with_scope_diagnostic() {
            local desc="$1"
            shift
            local out
            set +e
            out="$("$@" 2>&1)"
            local code=$?
            set -e
            if [[ "$code" -ne 0 ]]; then
              if grep -qiE 'workflow[[:space:]-]*scope|without `workflow` scope|refusing to allow an OAuth App to create or update workflow' <<<"$out"; then
                echo "::error::${desc} failed: token lacks workflow scope. Configure DEPENDABOT_AUTOMERGE_TOKEN with workflow-capable permissions."
                echo "$out"
                exit 1
              fi
              echo "::error::${desc} failed."
              echo "$out"
              exit 1
            fi
          }

          state="$(gh api "repos/$REPO/pulls/$PR" --jq '.mergeable_state')"
          head_sha="$(gh api "repos/$REPO/pulls/$PR" --jq '.head.sha')"
          if [[ "$state" == "behind" ]]; then
            run_with_scope_diagnostic "update-branch" gh api -X PUT "repos/$REPO/pulls/$PR/update-branch" -f expected_head_sha="$head_sha"
            gh pr comment "$PR" --repo "$REPO" --body "@dependabot rebase" >/dev/null 2>&1 || true
            gh pr comment "$PR" --repo "$REPO" --body "Dependabot automerge: branch update requested." >/dev/null 2>&1 || true
          fi

      - name: Auto-approve safe PR
        if: steps.policy.outputs.safe == 'true'
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_BOT_TOKEN:-$GH_FALLBACK_TOKEN}"
          gh api -X POST "repos/$REPO/pulls/$PR/reviews" \
            -f event=APPROVE \
            -f body="Auto-approved (safe Dependabot allowlist path under TOR-GH-DEPS-A02)." \
            >/dev/null 2>&1 || true

      - name: Enable auto-merge (rebase)
        if: steps.policy.outputs.safe == 'true'
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_BOT_TOKEN:-$GH_FALLBACK_TOKEN}"
          run_with_scope_diagnostic() {
            local desc="$1"
            shift
            local out
            set +e
            out="$("$@" 2>&1)"
            local code=$?
            set -e
            if [[ "$code" -ne 0 ]]; then
              if grep -qiE 'workflow[[:space:]-]*scope|without `workflow` scope|refusing to allow an OAuth App to create or update workflow' <<<"$out"; then
                echo "::error::${desc} failed: token lacks workflow scope. Configure DEPENDABOT_AUTOMERGE_TOKEN with workflow-capable permissions."
                echo "$out"
                exit 1
              fi
              echo "::error::${desc} failed."
              echo "$out"
              exit 1
            fi
          }

          run_with_scope_diagnostic "enable-auto-merge" gh pr merge "$PR" --repo "$REPO" --auto --rebase
          gh pr comment "$PR" --repo "$REPO" --body "Auto-approved and auto-merge enabled (safe workflow-only Dependabot change)." >/dev/null 2>&1 || true

      - name: Verify auto-merge gate for safe lane
        if: steps.policy.outputs.safe == 'true'
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_BOT_TOKEN:-$GH_FALLBACK_TOKEN}"
          pr_json="$(gh api "repos/$REPO/pulls/$PR")"
          pr_merged="$(jq -r 'if .merged_at == null then "false" else "true" end' <<<"$pr_json")"
          if [[ "$pr_merged" == "true" ]]; then
            echo "Safe-lane PR already merged; verification passes."
            exit 0
          fi
          auto_merge_enabled="$(jq -r 'if .auto_merge == null then "false" else "true" end' <<<"$pr_json")"
          if [[ "$auto_merge_enabled" != "true" ]]; then
            echo "::error::Safe-lane PR did not end with auto-merge enabled."
            gh pr checks "$PR" --repo "$REPO" || true
            exit 1
          fi
