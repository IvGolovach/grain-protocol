name: dependabot-automerge

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  dependabot-safe-lane:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request'
      )
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      DEPENDABOT_AUTOMERGE_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
      BLOCK_SEMVER_MAJOR_ACTIONS: "false"
    steps:
      - name: Collect candidate PRs from trusted workflow_run
        id: collect
        run: |
          set -euo pipefail
          rm -f candidate-prs.txt

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch does not auto-select PRs."
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          actor_login="$(jq -r '.workflow_run.actor.login // empty' "$GITHUB_EVENT_PATH")"
          if [[ "$actor_login" != "dependabot[bot]" && "$actor_login" != "app/dependabot" ]]; then
            echo "No Dependabot actor for this run ($actor_login); skipping."
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -r '.workflow_run.pull_requests[].number // empty' "$GITHUB_EVENT_PATH" | sort -u > candidate-prs.txt
          if [[ ! -s candidate-prs.txt ]]; then
            echo "No PRs attached to workflow_run."
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_candidates=true" >> "$GITHUB_OUTPUT"

      - name: Token presence check (strict)
        if: steps.collect.outputs.has_candidates == 'true'
        run: |
          set -euo pipefail
          if [[ -z "${DEPENDABOT_AUTOMERGE_TOKEN:-}" ]]; then
            echo "::error::DEPS_ERR_TOKEN_MISSING: repository secret DEPENDABOT_AUTOMERGE_TOKEN is required."
            exit 1
          fi

      - name: Token permission check (strict)
        if: steps.collect.outputs.has_candidates == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh api "repos/$REPO/actions/workflows" >/dev/null 2>&1; then
            echo "::error::DEPS_ERR_TOKEN_INSUFFICIENT_PERMS: token must include workflows write-capable permissions."
            exit 1
          fi

      - name: Evaluate policy and execute automerge lane
        if: steps.collect.outputs.has_candidates == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
        run: |
          set -euo pipefail
          bot_login="$(gh api user --jq '.login')"
          while read -r pr; do
            [[ -n "$pr" ]] || continue

            pr_user="$(gh api "repos/$REPO/pulls/$pr" --jq '.user.login')"
            pr_state="$(gh api "repos/$REPO/pulls/$pr" --jq '.state')"
            base_repo="$(gh api "repos/$REPO/pulls/$pr" --jq '.base.repo.full_name // empty')"
            head_repo="$(gh api "repos/$REPO/pulls/$pr" --jq '.head.repo.full_name // empty')"
            pr_title="$(gh api "repos/$REPO/pulls/$pr" --jq '.title')"

            if [[ "$pr_state" != "open" ]]; then
              continue
            fi

            if [[ "$pr_user" != "dependabot[bot]" && "$pr_user" != "app/dependabot" ]]; then
              continue
            fi

            reasons=()
            safe=true
            mapfile -t files < <(gh api "repos/$REPO/pulls/$pr/files?per_page=100" --paginate --jq '.[].filename')

            if [[ "${#files[@]}" -eq 0 ]]; then
              safe=false
              reasons+=("no-changed-files")
            fi

            if [[ "$base_repo" != "$REPO" || "$head_repo" != "$REPO" ]]; then
              safe=false
              reasons+=("external-repo-head-or-base")
            fi

            for f in "${files[@]}"; do
              case "$f" in
                .github/workflows/*|.github/dependabot.yml|.github/ISSUE_TEMPLATE/*|.github/actions/*)
                  ;;
                *)
                  safe=false
                  reasons+=("path-not-allowlisted:$f")
                  ;;
              esac

              case "$f" in
                spec/*|conformance/*|core/*|runner/*|docs/llm/*|tools/*)
                  safe=false
                  reasons+=("denylist-hit:$f")
                  ;;
                *)
                  ;;
              esac
            done

            if [[ "${BLOCK_SEMVER_MAJOR_ACTIONS}" == "true" ]]; then
              if [[ "$pr_title" =~ from[[:space:]]v?([0-9]+)([^[:space:]]*)[[:space:]]to[[:space:]]v?([0-9]+) ]]; then
                from_major="${BASH_REMATCH[1]}"
                to_major="${BASH_REMATCH[3]}"
                if [[ "$from_major" != "$to_major" ]]; then
                  safe=false
                  reasons+=("semver-major:$from_major->$to_major")
                fi
              fi
            fi

            gh pr edit "$pr" --repo "$REPO" --add-label dependencies --add-label ci >/dev/null

            if [[ "$safe" != "true" ]]; then
              gh pr edit "$pr" --repo "$REPO" --add-label needs-manual >/dev/null
              reason_text="$(printf '%s\n' "${reasons[@]}" | sed 's/^/- /')"
              gh pr comment "$pr" --repo "$REPO" --body "Dependabot automerge policy: manual-review lane.\n\nReasons:\n$reason_text" >/dev/null
              continue
            fi

            merge_state="$(gh api "repos/$REPO/pulls/$pr" --jq '.mergeable_state')"
            if [[ "$merge_state" == "behind" ]]; then
              head_sha="$(gh api "repos/$REPO/pulls/$pr" --jq '.head.sha')"
              if ! gh api -X PUT "repos/$REPO/pulls/$pr/update-branch" -f expected_head_sha="$head_sha" >/dev/null; then
                echo "::error::DEPS_ERR_UPDATE_BRANCH_FAILED: pr=$pr"
                exit 1
              fi
              gh pr comment "$pr" --repo "$REPO" --body "@dependabot rebase" >/dev/null
              gh pr comment "$pr" --repo "$REPO" --body "Dependabot automerge: branch update requested." >/dev/null
              continue
            fi

            approved_state="$(
              gh api "repos/$REPO/pulls/$pr/reviews?per_page=100" \
                --paginate \
                --jq "[.[] | select(.user.login == \"$bot_login\")][-1].state // \"\""
            )"
            if [[ "$approved_state" != "APPROVED" ]]; then
              if ! gh pr review "$pr" --repo "$REPO" --approve --body "Auto-approved (safe Dependabot allowlist path under TOR-DEPS-STRICT-FINAL)."; then
                echo "::error::DEPS_ERR_APPROVE_FAILED: pr=$pr"
                exit 1
              fi
            fi

            if ! gh pr merge "$pr" --repo "$REPO" --auto --rebase; then
              echo "::error::DEPS_ERR_ENABLE_AUTOMERGE_FAILED: pr=$pr"
              exit 1
            fi

            gh pr comment "$pr" --repo "$REPO" --body "Auto-approved and auto-merge enabled (safe workflow-only Dependabot change)." >/dev/null
          done < candidate-prs.txt
