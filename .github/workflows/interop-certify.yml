name: interop-certify

on:
  workflow_dispatch:
  push:
    tags:
      - "protocol-*"
      - "repo-*"
      - "protocol-rc-*"
      - "repo-rc-*"

permissions:
  contents: write

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: runner/typescript/package-lock.json

      - name: Run TOR-CERT-D01 interop certification
        run: |
          tools/interop_certify.sh \
            --out-dir artifacts/interop-cert \
            --commit-sha "${GITHUB_SHA}"

      - name: Archive certification evidence
        run: |
          cd artifacts
          zip -r "interop-evidence-${GITHUB_SHA}.zip" interop-cert

      - name: Upload certification artifact
        uses: actions/upload-artifact@v7
        with:
          name: interop-evidence-${{ github.sha }}
          path: artifacts/interop-evidence-${{ github.sha }}.zip

      - name: Attach certification evidence to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/interop-evidence-${{ github.sha }}.zip
          generate_release_notes: false
          prerelease: ${{ startsWith(github.ref_name, 'protocol-rc-') || startsWith(github.ref_name, 'repo-rc-') }}
