name: interop-certify

on:
  workflow_dispatch:
  push:
    tags:
      - "protocol-*"
      - "repo-*"
      - "protocol-rc-*"
      - "repo-rc-*"

permissions:
  contents: write

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            core/ts/grain-ts-core/package-lock.json
            runner/typescript/package-lock.json
            core/ts/grain-sdk/package-lock.json

      - name: Run TOR-CERT-D01 interop certification
        run: |
          tools/interop_certify.sh \
            --out-dir artifacts/interop-cert \
            --commit-sha "${GITHUB_SHA}"

      - name: Archive certification evidence
        run: |
          cd artifacts
          zip -r "interop-evidence-${GITHUB_SHA}.zip" interop-cert

      - name: Upload certification artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: interop-evidence-${{ github.sha }}
          path: artifacts/interop-evidence-${{ github.sha }}.zip

      - name: Attach certification evidence to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          asset="artifacts/interop-evidence-${GITHUB_SHA}.zip"
          is_rc=0
          if [[ "${tag}" == protocol-rc-* || "${tag}" == repo-rc-* ]]; then
            is_rc=1
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" --clobber
            if [[ "${is_rc}" -eq 1 ]]; then
              gh release edit "${tag}" --prerelease
            fi
          else
            if [[ "${is_rc}" -eq 1 ]]; then
              gh release create "${tag}" "${asset}" --title "${tag}" --notes "" --prerelease
            else
              gh release create "${tag}" "${asset}" --title "${tag}" --notes ""
            fi
          fi
