name: Conformance Vector Request
description: Propose a new vector or fix an existing one.
title: "[conformance] "
labels:
  - conformance
  - triage
body:
  - type: textarea
    id: gap
    attributes:
      label: Coverage Gap
      description: Which behavior is not covered well enough today?
    validations:
      required: true

  - type: input
    id: op
    attributes:
      label: Operation
      description: Contract op (for example `manifest_resolve`, `e2e_derive_v1`).
      placeholder: "op"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Deterministic Outcome
      description: PASS/REJECT and the exact error code or output fields you expect.
    validations:
      required: true

  - type: textarea
    id: invariant
    attributes:
      label: Invariants
      description: Which invariant IDs this vector enforces.
      placeholder: "INV-..."
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I confirmed this does not change the stable v0.1 core behavior.
          required: true
        - label: I provided deterministic expected outputs or diagnostics.
          required: true
