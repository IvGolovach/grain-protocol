name: FoodWallet

options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 2
    ENABLE_CODE_COVERAGE: NO
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 6.0

packages:
  GrainFoodWalletApp:
    path: .

targets:
  FoodWallet:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/FoodWalletApp
      - path: AppStore/MealMark.storekit
        buildPhase: none
      - path: AppStore/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: AppStore/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: GrainFoodWalletApp
        product: FoodWalletCore
      - package: GrainFoodWalletApp
        product: FoodWalletAppIntents
    settings:
      base:
        INFOPLIST_FILE: AppStore/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GRAIN_FOOD_ANALYSIS_BROKER_URL: ""
        PRODUCT_BUNDLE_IDENTIFIER: dev.grain.foodwallet
        PRODUCT_NAME: FoodWallet
        TARGETED_DEVICE_FAMILY: "1"

  FoodWalletUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests/FoodWalletUITests
    dependencies:
      - target: FoodWallet
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.grain.foodwallet.uitests
        TEST_TARGET_NAME: FoodWallet

schemes:
  FoodWallet:
    build:
      targets:
        FoodWallet: all
        FoodWalletUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AppStore/MealMark.storekit
    test:
      config: Debug
      targets:
        - FoodWalletUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
